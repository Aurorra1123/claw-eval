# ============================================================================
# WARNING: This config is MISSING `model.input_modalities` and therefore
# SILENTLY DROPS IMAGE INPUT. With the default `input_modalities: [text]`,
# any image attachment is skipped before it reaches the model, so multimodal
# (image-input) tasks collapse to ~0.2 scores (image_loaded=0).
#
# For multimodal / image-input evaluation use `config_multimodal_smoke.yaml`
# instead (it sets `input_modalities: [text, image]` and points at the
# deepwisdom newapi endpoint). This file is kept only for non-image runs.
# ============================================================================

# Agent Eval default configuration

model:
  # OpenRouter endpoint (OpenAI-compatible)
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  model_id: anthropic/claude-opus-4.6
  context_window: 1000000
  extra_body:
    reasoning:
      effort: high

judge:
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  model_id: google/gemini-3-flash-preview
  enabled: true

defaults:
  trace_dir: traces
  tasks_dir: tasks

